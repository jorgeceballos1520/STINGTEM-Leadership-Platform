<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IDEA Spears Instructional Coaching Tracker 2.1</title>
<style>
:root{--navy:#17283c;--navy2:#253f5b;--paper:#f5f3ed;--card:#fff;--line:#dedbd1;--muted:#667487;--blue:#1677b8;--gold:#c9972d;--goldbg:#fbf0d8;--red:#b94831;--redbg:#f9e4dd;--green:#39734b;--greenbg:#e3f0e6;--purple:#654ea3;--purplebg:#eee9fb;--shadow:0 7px 22px rgba(24,40,60,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
button,input,select,textarea{font:inherit}button{cursor:pointer}.serif{font-family:Georgia,serif}
#app{display:flex;min-height:100vh}
aside{width:280px;background:var(--navy);color:#fff;padding:20px 15px;position:sticky;top:0;height:100vh;overflow:auto;display:flex;flex-direction:column}
.brand{padding:0 8px 16px}.brand h1{font-size:18px;margin:0}.brand p{font-size:11px;color:#aeb9c6;margin:5px 0 0}
nav button,.teacher-link{width:100%;border:0;background:transparent;color:#dce4eb;text-align:left;padding:9px 10px;border-radius:8px;margin:2px 0}
nav button:hover,.teacher-link:hover{background:rgba(255,255,255,.08)}nav button.active,.teacher-link.active{background:rgba(255,255,255,.16);font-weight:700;color:#fff}
.side-label{font-size:10px;color:#8796a7;letter-spacing:.08em;text-transform:uppercase;margin:17px 9px 6px}.teacher-link{display:flex;align-items:center;gap:7px;font-size:12.5px}.dot{width:8px;height:8px;border-radius:50%;background:#718096}.teacher-name{flex:1}.count{font-size:10px;background:var(--red);border-radius:12px;padding:2px 6px}.bottom{margin-top:auto;display:grid;gap:7px}.side-btn{border:1px solid #40546a;background:transparent;color:#cbd5df;padding:8px;border-radius:8px}
main{flex:1;padding:28px 36px;max-width:1300px}.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:15px;margin-bottom:20px}.page-head h2{font-size:25px;margin:0 0 4px}.sub{font-size:13px;color:var(--muted)}
.btn{border:1px solid var(--line);background:#fff;color:var(--navy);padding:9px 13px;border-radius:8px}.btn-primary{background:var(--navy);border-color:var(--navy);color:#fff}.btn-danger{color:var(--red)}
.stats{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px;margin-bottom:16px}.stat,.panel,.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}.stat{padding:14px}.stat b{font-size:23px;display:block}.stat span{font-size:11.5px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}.card{padding:15px}.teacher-card{cursor:pointer}.teacher-card:hover{border-color:#9aa6b1}.teacher-card h3{margin:0 0 2px;font-size:16px}.subject{font-size:12px;color:var(--muted);margin-bottom:10px}.row{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);margin-top:7px}
.panel{padding:17px;margin-bottom:14px}.panel h3{font-size:16px;margin:0 0 12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:13px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.four{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.badge{display:inline-block;padding:4px 8px;border-radius:18px;font-size:11px;font-weight:700}.Introduced{background:var(--redbg);color:var(--red)}.Practicing{background:var(--goldbg);color:#85600c}.Mastered{background:var(--greenbg);color:var(--green)}.Sustaining{background:var(--purplebg);color:var(--purple)}
.obs{border-left:5px solid var(--blue)}.entry-head{display:flex;justify-content:space-between;gap:10px}.entry-title{font-weight:700}.meta{font-size:11.5px;color:var(--muted);margin-top:3px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.chip{font-size:11px;border:1px solid var(--line);background:#faf9f5;padding:4px 7px;border-radius:7px}
.evidence{background:#f3f7fa;border:1px solid #d8e1e8;padding:10px;border-radius:8px;white-space:pre-wrap;font-size:13px}.gg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}.glow,.grow{padding:10px;border-radius:8px;font-size:13px}.glow{background:var(--goldbg)}.grow{background:var(--redbg)}.label{font-size:10px;text-transform:uppercase;font-weight:800;letter-spacing:.05em;display:block;margin-bottom:4px}
.action{margin-top:9px;background:#f8f7f2;border-radius:8px;padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:12.5px}th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:10.5px;text-transform:uppercase;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(13,25,39,.52);display:flex;align-items:flex-start;justify-content:center;padding:22px;overflow:auto;z-index:30}.modal{width:820px;max-width:100%;background:#fff;border-radius:14px;padding:24px;box-shadow:0 25px 70px rgba(0,0,0,.25)}.modal h3{font-size:20px;margin-top:0}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:700;color:#566373;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);padding:9px 10px;border-radius:8px;background:#fff;color:var(--navy)}.field textarea{min-height:68px;resize:vertical}.hint{font-size:11px;color:var(--muted);margin-top:4px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:17px}
.empty{text-align:center;color:var(--muted);padding:28px}.alert{background:var(--redbg);color:#78311f;padding:11px;border-radius:8px;margin-bottom:13px;font-size:13px}.small{font-size:11.5px}.muted{color:var(--muted)}
.level{padding:10px;border-radius:9px;text-align:center}.level strong{font-size:20px;display:block}.master{background:#e6f2e8}.meet{background:#e7eff8}.approach{background:#fbf0d8}.notmeet{background:#f9e4dd}
.ocs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.ocs>div{padding:11px;border-radius:9px;background:#f7f7f4;border:1px solid var(--line)}.presentation{background:#fff;padding:24px;border-radius:14px}.presentation h1{margin:0 0 4px}.metric{font-size:30px;font-weight:800}.no-print{}
@media print{aside,.no-print,.delete,.statusSelect{display:none!important}main{padding:0;max-width:none}.panel,.card,.stat{box-shadow:none;break-inside:avoid}body{background:#fff}.presentation{padding:0}}
@media(max-width:900px){#app{display:block}aside{position:static;width:auto;height:auto}main{padding:20px}.stats,.two,.three,.four,.gg,.ocs{grid-template-columns:1fr}.page-head{display:block}.page-head .btn{margin-top:10px}}
</style>
</head>
<body>
<div id="app">
<aside>
<div class="brand"><h1 class="serif">Instructional Coaching Tracker 2.1</h1><p>IDEA Spears · GET · GBF · OCS</p></div>
<nav>
<button data-view="dashboard" class="active">Dashboard</button>
<button data-view="exitTickets">Exit Ticket Data</button>
<button data-view="exams">Exam Data & OCS</button>
<button data-view="actions">Action Steps</button>
<button data-view="analytics">Analytics</button>
<button data-view="principal">Principal Presentation</button>
</nav>
<div class="side-label">Teacher Caseload</div><div id="teacherNav"></div>
<div class="bottom">
<button class="side-btn" id="backupBtn">Export Backup</button>
<button class="side-btn" id="importBtn">Import Backup</button>
<button class="side-btn" id="csvBtn">Export All Data CSV</button>
<input id="importFile" type="file" accept=".json" hidden>
</div>
</aside>
<main id="main"></main>
</div>
<script>
const TEACHERS=[
{id:"t1",name:"L. Williams",subject:"Intervention"},{id:"t2",name:"T. Chow",subject:"6th Math"},{id:"t3",name:"A. Emenonyu",subject:"7th Math"},{id:"t4",name:"R. Raybon",subject:"8th Math"},{id:"t5",name:"G. Naves",subject:"Geometry"},{id:"t6",name:"L. Conkleton",subject:"Alg 1 - Pre Cal"},{id:"t7",name:"Vacancy",subject:"Pre-Cal",vacancy:true},{id:"t8",name:"Vacancy",subject:"AP Statistics",vacancy:true},{id:"t9",name:"Vacancy",subject:"AP Physics",vacancy:true},{id:"t10",name:"L. Mosqueda",subject:"AP Spanish"},{id:"t11",name:"R. Quiroz",subject:"PE"},{id:"t12",name:"K. Waddell",subject:"PE"},{id:"t13",name:"K. Abdullah",subject:"Spanish"}];
const GET={"1. Content":["I. Unit Scope","II. Grade-Level Mastery","III. Unit Sequence","IV. Lesson-Level Mastery","V. Lesson Sequence","VI. Lesson Purpose","VII. Academic Content"],"2. Culture":["I. Classroom Routines & Procedures","II. Behavioral Expectations","III. Maximize Learning Time","IV. Culture of Joy","V. Response to Behavior","VI. Sense of Belonging","VII. Physical Environment"],"3. Ownership":["I. Think Ratio","II. Students Complete Work","III. Students Provide Evidence","IV. Students Respond to Peers"],"4. Using Data":["I. Students Receive Feedback","II. Data-Based Adjustments","III. Impact of Adjustments","IV. Student Tracking"],"5. Beyond the Lesson":["I. Family Communication & Partnership","II. Professional Responsibilities","III. Collaboration & Contribution","IV. Student Advocacy & Support"]};
const GBF={"Phase 1 · Pre-Teaching":{"Management":["Routines & Procedures 101","Plan and Practice Roll-Out","Square Up, Stand Still","Formal Register"],"Rigor":["Write Precise Learning Objectives","Script a Basic I Do","Design Aligned Exit Ticket","Internalize Key Lesson Parts","Build Time Stamps"]},"Phase 2 · Days 1–30":{"Management":["Economy of Language","Revise Routines","Do It Again","Teacher Radar","Whole-Class Reset"],"Rigor":["Write the Exemplar","Independent Practice","Monitor Aggressively","Pen in Hand"]},"Phase 3 · Days 31–60":{"Management":["Build Momentum","Pacing","Engage All Students","Narrate the Positive","Individual Corrections"],"Rigor":["Habits of Evidence","Whole-Group CFU","Target the Error","Re-teaching 101: Model"]},"Phase 4 · Days 61–90":{"Management":["Group Work Routines","Monitor Group Progress","Individual and Group Accountability"],"Rigor":["Guided Discourse","Show-Call","Stamp the Understanding","Universal Prompts","Wait Time","Close the Loop","Habits of Discussion"]},"Stretch It":{"Rigor":["Strategic Prompts","Data-Driven Call Sequence","Students Prompt Students","Go Conceptual","Upgrade Vocabulary","Stretch It"]}};
const KEY="idea_tracker_21";let state=JSON.parse(localStorage.getItem(KEY)||'{"observations":[],"exitTickets":[],"exams":[]}');let view={screen:"dashboard",teacherId:null};
const STATUS=["Introduced","Practicing","Mastered","Sustaining"],RATINGS=["Pre-Novice","Novice","Proficient","Advanced","Exceptional","Not Rated"];
function save(){localStorage.setItem(KEY,JSON.stringify(state))}function uid(){return crypto.randomUUID?crypto.randomUUID():"id"+Date.now()+Math.random().toString(36).slice(2)}function fmt(d){return d?new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—"}function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}function teacher(id){return TEACHERS.find(t=>t.id===id)||{name:"",subject:""}}function obsFor(id){return state.observations.filter(o=>o.teacherId===id).sort((a,b)=>b.date.localeCompare(a.date))}function etFor(id){return state.exitTickets.filter(o=>o.teacherId===id).sort((a,b)=>b.date.localeCompare(a.date))}function examsFor(id){return state.exams.filter(o=>o.teacherId===id).sort((a,b)=>b.date.localeCompare(a.date))}function activeFor(id){return obsFor(id).filter(o=>!["Mastered","Sustaining"].includes(o.status))}function totalET(x){return (+x.master||0)+(+x.meet||0)+(+x.approach||0)+(+x.notMeet||0)}function pct(n,t){return t?Math.round((n/t)*100):0}
function renderNav(){document.getElementById("teacherNav").innerHTML=TEACHERS.map(t=>`<button class="teacher-link ${view.teacherId===t.id?"active":""}" data-id="${t.id}"><span class="dot"></span><span class="teacher-name">${t.name} · ${t.subject}</span>${activeFor(t.id).length?`<span class="count">${activeFor(t.id).length}</span>`:""}</button>`).join("");document.querySelectorAll(".teacher-link").forEach(b=>b.onclick=()=>{view={screen:"teacher",teacherId:b.dataset.id};render()});document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view.screen))}
function render(){renderNav();const m=document.getElementById("main");if(view.screen==="dashboard")m.innerHTML=dashboard();if(view.screen==="teacher")m.innerHTML=teacherPage(view.teacherId);if(view.screen==="exitTickets")m.innerHTML=exitTicketPage();if(view.screen==="exams")m.innerHTML=examPage();if(view.screen==="actions")m.innerHTML=actionsPage();if(view.screen==="analytics")m.innerHTML=analytics();if(view.screen==="principal")m.innerHTML=principal();bind()}
function dashboard(){const today=new Date().toISOString().slice(0,10),over=state.observations.filter(o=>o.followUp&&o.followUp<today&&!["Mastered","Sustaining"].includes(o.status));return `<div class="page-head"><div><h2 class="serif">Instructional Leadership Dashboard</h2><div class="sub">Observation evidence, daily exit tickets, exam analysis, OCS, and coaching follow-through.</div></div><div><button class="btn btn-primary" id="newObs">+ Observation</button></div></div>${over.length?`<div class="alert"><b>${over.length} coaching follow-up${over.length===1?" is":"s are"} overdue.</b></div>`:""}<div class="stats"><div class="stat"><b>${state.observations.length}</b><span>Observation records</span></div><div class="stat"><b>${state.exitTickets.length}</b><span>Exit-ticket entries</span></div><div class="stat"><b>${state.exams.length}</b><span>Exam analyses</span></div><div class="stat"><b>${state.observations.filter(o=>!["Mastered","Sustaining"].includes(o.status)).length}</b><span>Active action steps</span></div><div class="stat"><b>${over.length}</b><span>Overdue follow-ups</span></div></div><div class="grid">${TEACHERS.map(t=>{const os=obsFor(t.id),ets=etFor(t.id),xs=examsFor(t.id),latestET=ets[0];return `<div class="card teacher-card ${t.vacancy?"muted":""}" data-id="${t.id}"><h3>${t.name}</h3><div class="subject">${t.subject}</div>${t.vacancy?`<div class="small muted">Position not yet filled</div>`:`<div class="row"><span>${os.length} coaching records</span><span>${activeFor(t.id).length} active steps</span></div><div class="row"><span>${ets.length} exit tickets</span><span>${xs.length} exams</span></div><div class="row"><span>Latest mastery</span><b>${latestET?pct((+latestET.master||0)+(+latestET.meet||0),totalET(latestET))+"%":"—"}</b></div>`}</div>`}).join("")}</div>`}
function teacherPage(id){const t=teacher(id),os=obsFor(id),ets=etFor(id),xs=examsFor(id),latestET=ets[0],latestExam=xs[0];return `<div class="page-head"><div><button class="btn no-print" id="back">← Dashboard</button><h2 class="serif" style="margin-top:12px">${t.name}</h2><div class="sub">${t.subject}</div></div>${!t.vacancy?`<div class="no-print"><button class="btn" id="newET">+ Exit Ticket</button> <button class="btn" id="newExam">+ Exam Data</button> <button class="btn btn-primary" id="newObs">+ Observation</button></div>`:""}</div>${latestET?etSummary(latestET):""}${latestExam?examSummary(latestExam):""}<div class="panel"><h3>Observation & Coaching History</h3>${os.length?os.map(obsCard).join(""):`<div class="empty">No observation records yet.</div>`}</div>`}
function etSummary(e){const t=totalET(e),met=(+e.master||0)+(+e.meet||0);return `<div class="panel"><h3>Most Recent Exit Ticket · ${fmt(e.date)}</h3><div class="four"><div class="level master"><strong>${e.master}</strong><span>Mastered</span></div><div class="level meet"><strong>${e.meet}</strong><span>Met</span></div><div class="level approach"><strong>${e.approach}</strong><span>Approached</span></div><div class="level notmeet"><strong>${e.notMeet}</strong><span>Did Not Meet</span></div></div><div class="row"><span>Mastered/Met Objective</span><b>${pct(met,t)}%</b></div><div class="two" style="margin-top:10px"><div><span class="label">Possible Misconceptions</span><div class="evidence">${esc(e.misconceptions||"—")}</div></div><div><span class="label">Planned Next Steps</span><div class="evidence">${esc(e.nextSteps||"—")}</div></div></div><div class="action"><div><b>Observation look-for generated from teacher data:</b> ${esc(e.observationLookFor||e.nextSteps||"Review implementation of reteach plan and collect evidence of student response.")}</div></div></div>`}
function examSummary(x){return `<div class="panel"><h3>Latest Exam Analysis · ${esc(x.examName)} · ${fmt(x.date)}</h3><div class="row"><span>Period ${esc(x.period)}</span><b>${esc(x.proficiency)}% proficient</b></div><div class="ocs" style="margin-top:10px"><div><span class="label">Outcome</span>${esc(x.outcome)}</div><div><span class="label">Causes</span>${esc(x.causes)}</div><div><span class="label">Solutions</span>${esc(x.solutions)}</div></div><div class="action"><div><b>Aligned observation focus:</b> ${esc(x.observationFocus||x.solutions)}</div></div></div>`}
function obsCard(o){return `<div class="panel obs"><div class="entry-head"><div><div class="entry-title">${fmt(o.date)} · ${esc(o.type)}</div><div class="meta">${esc(o.getGuide)} · ${esc(o.getStrand)} · ${esc(o.gbfAction)}</div></div><button class="btn btn-danger delete" data-kind="observations" data-id="${o.id}">Delete</button></div><div class="chips"><span class="chip">${esc(o.rating)}</span><span class="chip">${esc(o.gbfPhase)}</span><span class="chip">Data source: ${esc(o.dataSource||"Direct observation")}</span></div><span class="label">Low-Inference Evidence</span><div class="evidence">${esc(o.evidence||"—")}</div><div class="gg"><div class="glow"><span class="label">Glow</span>${esc(o.glow||"—")}</div><div class="grow"><span class="label">Grow</span>${esc(o.grow||"—")}</div></div><div class="action"><div><b>Action step:</b> ${esc(o.actionStep||"—")}<div class="small muted">Next look-for: ${esc(o.lookFor||"—")} · Follow-up: ${fmt(o.followUp)}</div></div><select class="statusSelect" data-id="${o.id}">${STATUS.map(s=>`<option ${s===o.status?"selected":""}>${s}</option>`).join("")}</select></div></div>`}
function exitTicketPage(){const rows=[...state.exitTickets].sort((a,b)=>b.date.localeCompare(a.date));return `<div class="page-head"><div><h2 class="serif">Daily Exit Ticket Data</h2><div class="sub">Teachers enter student outcomes, misconceptions, reteach plans, and observation look-fors.</div></div><button class="btn btn-primary" id="newET">+ Add Exit Ticket Data</button></div><div class="panel"><table><thead><tr><th>Date</th><th>Teacher</th><th>Objective / Period</th><th>Master</th><th>Meet</th><th>Approach</th><th>Not Meet</th><th>Mastered/Met</th><th>Misconception & Next Step</th></tr></thead><tbody>${rows.map(e=>{const t=teacher(e.teacherId),tot=totalET(e);return `<tr><td>${fmt(e.date)}</td><td>${t.name}<div class="small muted">${t.subject}</div></td><td>${esc(e.objective)}<div class="small muted">Period ${esc(e.period)}</div></td><td>${e.master}</td><td>${e.meet}</td><td>${e.approach}</td><td>${e.notMeet}</td><td><b>${pct((+e.master||0)+(+e.meet||0),tot)}%</b></td><td>${esc(e.misconceptions)}<div class="small muted">${esc(e.nextSteps)}</div></td></tr>`}).join("")||`<tr><td colspan="9" class="empty">No exit-ticket data yet.</td></tr>`}</tbody></table></div>`}
function examPage(){const rows=[...state.exams].sort((a,b)=>b.date.localeCompare(a.date));return `<div class="page-head"><div><h2 class="serif">Exam Data & Outcomes–Causes–Solutions</h2><div class="sub">Analyze each class period and convert findings into coaching and observation priorities.</div></div><button class="btn btn-primary" id="newExam">+ Add Exam Analysis</button></div>${rows.map(x=>{const t=teacher(x.teacherId);return `<div class="panel"><div class="entry-head"><div><h3>${t.name} · ${esc(x.examName)}</h3><div class="meta">${fmt(x.date)} · Period ${esc(x.period)} · ${esc(x.proficiency)}% proficient</div></div><button class="btn btn-danger delete" data-kind="exams" data-id="${x.id}">Delete</button></div><div class="ocs"><div><span class="label">Outcome</span>${esc(x.outcome)}</div><div><span class="label">Causes</span>${esc(x.causes)}</div><div><span class="label">Solutions</span>${esc(x.solutions)}</div></div><div class="action"><div><b>Use in observation:</b> ${esc(x.observationFocus||x.solutions)}</div></div></div>`}).join("")||`<div class="panel empty">No exam analyses yet.</div>`}` }
function actionsPage(){const rows=state.observations.filter(o=>o.actionStep).sort((a,b)=>(a.followUp||"9999").localeCompare(b.followUp||"9999"));return `<div class="page-head"><div><h2 class="serif">Action Step Tracker</h2><div class="sub">Monitor progress from introduction through sustained mastery.</div></div><button class="btn btn-primary" id="newObs">+ Observation</button></div><div class="panel"><table><thead><tr><th>Teacher</th><th>GET / GBF</th><th>Action Step</th><th>Follow-up</th><th>Status</th></tr></thead><tbody>${rows.map(o=>`<tr><td>${teacher(o.teacherId).name}</td><td>${esc(o.getStrand)}<div class="small muted">${esc(o.gbfAction)}</div></td><td>${esc(o.actionStep)}</td><td>${fmt(o.followUp)}</td><td><select class="statusSelect" data-id="${o.id}">${STATUS.map(s=>`<option ${s===o.status?"selected":""}>${s}</option>`).join("")}</select></td></tr>`).join("")||`<tr><td colspan="5" class="empty">No action steps yet.</td></tr>`}</tbody></table></div>`}
function analytics(){const tally=(arr,key)=>{const m={};arr.forEach(o=>{const v=o[key]||"Not selected";m[v]=(m[v]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])};const box=(title,rows)=>`<div class="panel"><h3>${title}</h3><table>${rows.map(([n,c])=>`<tr><td>${esc(n)}</td><td><b>${c}</b></td></tr>`).join("")||`<tr><td>No data</td></tr>`}</table></div>`;return `<div class="page-head"><div><h2 class="serif">Analytics</h2><div class="sub">Campus patterns that support coaching, planning, and principal updates.</div></div></div><div class="two">${box("Most Frequent GET Strands",tally(state.observations,"getStrand"))}${box("Most Frequent GBF Skills",tally(state.observations,"gbfAction"))}</div><div class="two">${box("Action Step Status",tally(state.observations,"status"))}${box("Most Common Exam Causes",tally(state.exams,"causeCategory"))}</div>`}
function principal(){const totalStudents=state.exitTickets.reduce((a,e)=>a+totalET(e),0),met=state.exitTickets.reduce((a,e)=>a+(+e.master||0)+(+e.meet||0),0),active=state.observations.filter(o=>!["Mastered","Sustaining"].includes(o.status)).length;return `<div class="page-head no-print"><div><h2 class="serif">Principal Presentation</h2><div class="sub">A printable summary of instructional outcomes, causes, solutions, and coaching follow-through.</div></div><button class="btn btn-primary" onclick="window.print()">Print / Save as PDF</button></div><div class="presentation"><h1 class="serif">IDEA Spears Instructional Coaching Brief</h1><div class="sub">Prepared by Jorge Ceballos, API · ${fmt(new Date().toISOString().slice(0,10))}</div><div class="stats" style="margin-top:18px"><div class="stat"><b>${state.observations.length}</b><span>Coaching records</span></div><div class="stat"><b>${state.exitTickets.length}</b><span>Exit tickets analyzed</span></div><div class="stat"><b>${totalStudents?pct(met,totalStudents):0}%</b><span>Students mastered/met</span></div><div class="stat"><b>${state.exams.length}</b><span>Exam OCS analyses</span></div><div class="stat"><b>${active}</b><span>Active action steps</span></div></div><div class="two"><div class="panel"><h3>Current Instructional Outcomes</h3>${state.exams.slice(-5).reverse().map(x=>`<p><b>${teacher(x.teacherId).name}, Period ${esc(x.period)}:</b> ${esc(x.outcome)}</p>`).join("")||"<p>No exam outcomes entered.</p>"}</div><div class="panel"><h3>Highest-Leverage Solutions</h3>${state.exams.slice(-5).reverse().map(x=>`<p><b>${teacher(x.teacherId).name}:</b> ${esc(x.solutions)}</p>`).join("")||"<p>No solutions entered.</p>"}</div></div><div class="panel"><h3>Observation and Coaching Priorities</h3><table><thead><tr><th>Teacher</th><th>GET Focus</th><th>GBF Skill</th><th>Action Step / Next Look-For</th><th>Status</th></tr></thead><tbody>${state.observations.slice().reverse().slice(0,12).map(o=>`<tr><td>${teacher(o.teacherId).name}</td><td>${esc(o.getStrand)}</td><td>${esc(o.gbfAction)}</td><td>${esc(o.actionStep)}<div class="small muted">${esc(o.lookFor)}</div></td><td>${esc(o.status)}</td></tr>`).join("")||`<tr><td colspan="5">No coaching data entered.</td></tr>`}</tbody></table></div></div>`}
function bind(){document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{view={screen:b.dataset.view,teacherId:null};render()});document.querySelectorAll(".teacher-card").forEach(c=>c.onclick=()=>{view={screen:"teacher",teacherId:c.dataset.id};render()});let x=document.getElementById("back");if(x)x.onclick=()=>{view={screen:"dashboard",teacherId:null};render()};x=document.getElementById("newObs");if(x)x.onclick=()=>openObs(view.teacherId);x=document.getElementById("newET");if(x)x.onclick=()=>openET(view.teacherId);x=document.getElementById("newExam");if(x)x.onclick=()=>openExam(view.teacherId);document.querySelectorAll(".statusSelect").forEach(s=>s.onchange=()=>{const o=state.observations.find(x=>x.id===s.dataset.id);o.status=s.value;save();render()});document.querySelectorAll(".delete").forEach(b=>b.onclick=()=>{if(confirm("Delete this record?")){state[b.dataset.kind]=state[b.dataset.kind].filter(x=>x.id!==b.dataset.id);save();render()}})}
function opts(a){return a.map(x=>`<option>${x}</option>`).join("")}
function modal(inner){const o=document.createElement("div");o.className="overlay";o.innerHTML=`<div class="modal">${inner}</div>`;document.body.appendChild(o);o.onclick=e=>{if(e.target===o)o.remove()};return o}
function openET(id){const o=modal(`<h3 class="serif">Add Daily Exit Ticket Data</h3><div class="two"><div class="field"><label>Teacher</label><select id="etTeacher">${TEACHERS.filter(t=>!t.vacancy).map(t=>`<option value="${t.id}" ${t.id===id?"selected":""}>${t.name} · ${t.subject}</option>`).join("")}</select></div><div class="field"><label>Date</label><input id="etDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div><div class="two"><div class="field"><label>Class Period</label><input id="etPeriod"></div><div class="field"><label>Lesson Objective</label><input id="etObjective"></div></div><div class="four"><div class="field"><label>Mastered Objective</label><input id="etMaster" type="number" min="0" value="0"></div><div class="field"><label>Met Objective</label><input id="etMeet" type="number" min="0" value="0"></div><div class="field"><label>Approached Objective</label><input id="etApproach" type="number" min="0" value="0"></div><div class="field"><label>Did Not Meet</label><input id="etNot" type="number" min="0" value="0"></div></div><div class="field"><label>Possible Misconceptions / Errors Observed</label><textarea id="etMis"></textarea></div><div class="field"><label>Next Steps to Address the Misconceptions</label><textarea id="etNext"></textarea></div><div class="field"><label>What Should the API Look For During the Next Observation?</label><textarea id="etLook" placeholder="Example: Observe the reteach model, monitor how the teacher checks the identified misconception, and collect student response data."></textarea></div><div class="modal-actions"><button class="btn cancel">Cancel</button><button class="btn btn-primary save">Save Exit Ticket Data</button></div>`);o.querySelector(".cancel").onclick=()=>o.remove();o.querySelector(".save").onclick=()=>{const v=x=>document.getElementById(x).value;state.exitTickets.push({id:uid(),teacherId:v("etTeacher"),date:v("etDate"),period:v("etPeriod"),objective:v("etObjective"),master:+v("etMaster"),meet:+v("etMeet"),approach:+v("etApproach"),notMeet:+v("etNot"),misconceptions:v("etMis"),nextSteps:v("etNext"),observationLookFor:v("etLook")});save();o.remove();view={screen:"teacher",teacherId:v("etTeacher")};render()}}
function openExam(id){const o=modal(`<h3 class="serif">Add Exam Data and OCS Analysis</h3><div class="two"><div class="field"><label>Teacher</label><select id="xTeacher">${TEACHERS.filter(t=>!t.vacancy).map(t=>`<option value="${t.id}" ${t.id===id?"selected":""}>${t.name} · ${t.subject}</option>`).join("")}</select></div><div class="field"><label>Date</label><input id="xDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div><div class="three"><div class="field"><label>Exam / Assessment Name</label><input id="xName"></div><div class="field"><label>Class Period</label><input id="xPeriod"></div><div class="field"><label>% Proficient</label><input id="xProf" type="number" min="0" max="100"></div></div><div class="field"><label>Outcome: What did students learn or fail to learn?</label><textarea id="xOutcome"></textarea></div><div class="field"><label>Causes: What teacher actions, student actions, planning, or misconceptions contributed?</label><textarea id="xCauses"></textarea></div><div class="field"><label>Cause Category</label><select id="xCat">${opts(["Planning / Internalization","Rigor / Alignment","Culture / Routines","Ownership / Think Ratio","Using Data / CFU","Academic Monitoring","Student Misconception","Other"])}</select></div><div class="field"><label>Solutions: What will be implemented, by whom, and by when?</label><textarea id="xSolutions"></textarea></div><div class="field"><label>How Should This Data Shape the Next Observation?</label><textarea id="xFocus"></textarea></div><div class="modal-actions"><button class="btn cancel">Cancel</button><button class="btn btn-primary save">Save Exam Analysis</button></div>`);o.querySelector(".cancel").onclick=()=>o.remove();o.querySelector(".save").onclick=()=>{const v=x=>document.getElementById(x).value;state.exams.push({id:uid(),teacherId:v("xTeacher"),date:v("xDate"),examName:v("xName"),period:v("xPeriod"),proficiency:v("xProf"),outcome:v("xOutcome"),causes:v("xCauses"),causeCategory:v("xCat"),solutions:v("xSolutions"),observationFocus:v("xFocus")});save();o.remove();view={screen:"teacher",teacherId:v("xTeacher")};render()}}
function openObs(id){let phase=Object.keys(GBF)[0];const o=modal(`<h3 class="serif">New Observation / Coaching Record</h3><div class="two"><div class="field"><label>Teacher</label><select id="oTeacher">${TEACHERS.filter(t=>!t.vacancy).map(t=>`<option value="${t.id}" ${t.id===id?"selected":""}>${t.name} · ${t.subject}</option>`).join("")}</select></div><div class="field"><label>Date</label><input id="oDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div><div class="two"><div class="field"><label>Record Type</label><select id="oType">${opts(["Lesson Internalization Feedback","Classroom Observation","Coaching Conversation","Coach to Mastery Follow-Up","LP Feedback","Informal Walkthrough","Formal Walkthrough"])}</select></div><div class="field"><label>Data Source</label><select id="oSource">${opts(["Direct observation","Exit ticket data","Exam data / OCS","Lesson plan / internalization","Student work","Multiple sources"])}</select></div></div><div class="two"><div class="field"><label>GET Guidepost</label><select id="oGuide">${opts(Object.keys(GET))}</select></div><div class="field"><label>GET Strand</label><select id="oStrand"></select></div></div><div class="field"><label>GET Rating</label><select id="oRating">${opts(RATINGS)}</select></div><div class="field"><label>Low-Inference Evidence</label><textarea id="oEvidence"></textarea></div><div class="two"><div class="field"><label>GBF Phase</label><select id="oPhase">${opts(Object.keys(GBF))}</select></div><div class="field"><label>GBF Trajectory</label><select id="oTrajectory"></select></div></div><div class="field"><label>GBF Skill / Action Step</label><select id="oGBF"></select></div><div class="two"><div class="field"><label>Glow</label><textarea id="oGlow"></textarea></div><div class="field"><label>Grow</label><textarea id="oGrow"></textarea></div></div><div class="field"><label>Specific Teacher Action Step</label><textarea id="oAction"></textarea></div><div class="two"><div class="field"><label>Look-For at Next Visit</label><textarea id="oLook"></textarea></div><div><div class="field"><label>Follow-Up Date</label><input id="oFollow" type="date"></div><div class="field"><label>Status</label><select id="oStatus">${opts(STATUS)}</select></div></div></div><div class="modal-actions"><button class="btn cancel">Cancel</button><button class="btn btn-primary save">Save Observation</button></div>`);const guide=()=>document.getElementById("oStrand").innerHTML=opts(GET[document.getElementById("oGuide").value]);const phases=()=>{phase=document.getElementById("oPhase").value;document.getElementById("oTrajectory").innerHTML=opts(Object.keys(GBF[phase]));skills()};const skills=()=>document.getElementById("oGBF").innerHTML=opts(GBF[phase][document.getElementById("oTrajectory").value]||[]);guide();phases();document.getElementById("oGuide").onchange=guide;document.getElementById("oPhase").onchange=phases;document.getElementById("oTrajectory").onchange=skills;o.querySelector(".cancel").onclick=()=>o.remove();o.querySelector(".save").onclick=()=>{const v=x=>document.getElementById(x).value;state.observations.push({id:uid(),teacherId:v("oTeacher"),date:v("oDate"),type:v("oType"),dataSource:v("oSource"),getGuide:v("oGuide"),getStrand:v("oStrand"),rating:v("oRating"),evidence:v("oEvidence"),gbfPhase:v("oPhase"),gbfTrajectory:v("oTrajectory"),gbfAction:v("oGBF"),glow:v("oGlow"),grow:v("oGrow"),actionStep:v("oAction"),lookFor:v("oLook"),followUp:v("oFollow"),status:v("oStatus")});save();o.remove();view={screen:"teacher",teacherId:v("oTeacher")};render()}}
function download(name,text,type){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
document.getElementById("backupBtn").onclick=()=>download("idea-spears-tracker-2.1-backup.json",JSON.stringify(state,null,2),"application/json");document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();document.getElementById("importFile").onchange=e=>{const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();alert("Backup imported.")}catch{alert("Invalid backup file.")}};r.readAsText(e.target.files[0])};document.getElementById("csvBtn").onclick=()=>{const rows=[["Record Type","Date","Teacher","Subject","Details"],...state.observations.map(o=>["Observation",o.date,teacher(o.teacherId).name,teacher(o.teacherId).subject,`${o.getStrand} | ${o.gbfAction} | ${o.evidence} | ${o.actionStep}`]),...state.exitTickets.map(e=>["Exit Ticket",e.date,teacher(e.teacherId).name,teacher(e.teacherId).subject,`${e.objective} | M:${e.master} Meet:${e.meet} A:${e.approach} NM:${e.notMeet} | ${e.misconceptions} | ${e.nextSteps}`]),...state.exams.map(x=>["Exam OCS",x.date,teacher(x.teacherId).name,teacher(x.teacherId).subject,`${x.examName} P${x.period} | ${x.outcome} | ${x.causes} | ${x.solutions}`])];download("idea-spears-all-data.csv",rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n"),"text/csv")};
render();
</script>
