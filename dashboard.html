<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IDEA Spears Instructional Leadership Platform v2.1</title>
<style>
:root{--navy:#17283c;--navy2:#253f5b;--paper:#f5f3ed;--card:#fff;--line:#dedbd1;--muted:#667487;--blue:#1677b8;--gold:#c9972d;--goldbg:#fbf0d8;--red:#b94831;--redbg:#f9e4dd;--green:#39734b;--greenbg:#e3f0e6;--purple:#654ea3;--purplebg:#eee9fb;--shadow:0 7px 22px rgba(24,40,60,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--navy);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
button,input,select,textarea{font:inherit}button{cursor:pointer}.serif{font-family:Georgia,serif}
#app{display:flex;min-height:100vh}
aside{width:280px;background:var(--navy);color:#fff;padding:20px 15px;position:sticky;top:0;height:100vh;overflow:auto;display:flex;flex-direction:column}
.brand{padding:0 8px 16px}.brand h1{font-size:18px;margin:0}.brand p{font-size:11px;color:#aeb9c6;margin:5px 0 0}
nav button,.teacher-link{width:100%;border:0;background:transparent;color:#dce4eb;text-align:left;padding:9px 10px;border-radius:8px;margin:2px 0}
nav button:hover,.teacher-link:hover{background:rgba(255,255,255,.08)}nav button.active,.teacher-link.active{background:rgba(255,255,255,.16);font-weight:700;color:#fff}
.side-label{font-size:10px;color:#8796a7;letter-spacing:.08em;text-transform:uppercase;margin:17px 9px 6px}.teacher-link{display:flex;align-items:center;gap:7px;font-size:12.5px}.dot{width:8px;height:8px;border-radius:50%;background:#718096}.teacher-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.count{font-size:10px;background:var(--red);border-radius:12px;padding:2px 6px}.bottom{margin-top:auto;display:grid;gap:7px}.side-btn{border:1px solid #40546a;background:transparent;color:#cbd5df;padding:8px;border-radius:8px}
main{flex:1;padding:28px 36px;max-width:1300px}.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:15px;margin-bottom:20px}.page-head h2{font-size:25px;margin:0 0 4px}.sub{font-size:13px;color:var(--muted)}
.btn{border:1px solid var(--line);background:#fff;color:var(--navy);padding:9px 13px;border-radius:8px}.btn-primary{background:var(--navy);border-color:var(--navy);color:#fff}.btn-danger{color:var(--red)}
.stats{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px;margin-bottom:16px}.stat,.panel,.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}.stat{padding:14px}.stat b{font-size:23px;display:block}.stat span{font-size:11.5px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}.card{padding:15px}.teacher-card{cursor:pointer}.teacher-card:hover{border-color:#9aa6b1}.teacher-card h3{margin:0 0 2px;font-size:16px}.subject{font-size:12px;color:var(--muted);margin-bottom:10px}.row{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);margin-top:7px}
.panel{padding:17px;margin-bottom:14px}.panel h3{font-size:16px;margin:0 0 12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:13px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.four{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.badge{display:inline-block;padding:4px 8px;border-radius:18px;font-size:11px;font-weight:700}.Introduced{background:var(--redbg);color:var(--red)}.Practicing{background:var(--goldbg);color:#85600c}.Mastered{background:var(--greenbg);color:var(--green)}.Sustaining{background:var(--purplebg);color:var(--purple)}
.PreNovice{background:var(--redbg);color:var(--red)}.Novice{background:var(--goldbg);color:#85600c}.Proficient{background:#e7eff8;color:var(--blue)}.Advanced{background:var(--greenbg);color:var(--green)}.Exceptional{background:var(--purplebg);color:var(--purple)}.NotRated{background:#eee;color:var(--muted)}
.NotStarted{background:#eee;color:var(--muted)}.InProgress{background:var(--goldbg);color:#85600c}.Met{background:var(--greenbg);color:var(--green)}
.trend-up{color:var(--green);font-weight:700}.trend-down{color:var(--red);font-weight:700}.trend-flat{color:var(--muted)}
.obs{border-left:5px solid var(--blue)}.entry-head{display:flex;justify-content:space-between;gap:10px}.entry-title{font-weight:700}.meta{font-size:11.5px;color:var(--muted);margin-top:3px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}.chip{font-size:11px;border:1px solid var(--line);background:#faf9f5;padding:4px 7px;border-radius:7px}
.evidence{background:#f3f7fa;border:1px solid #d8e1e8;padding:10px;border-radius:8px;white-space:pre-wrap;font-size:13px}.gg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}.glow,.grow{padding:10px;border-radius:8px;font-size:13px}.glow{background:var(--goldbg)}.grow{background:var(--redbg)}.label{font-size:10px;text-transform:uppercase;font-weight:800;letter-spacing:.05em;display:block;margin-bottom:4px}
.action{margin-top:9px;background:#f8f7f2;border-radius:8px;padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:12.5px}th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:10.5px;text-transform:uppercase;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(13,25,39,.52);display:flex;align-items:flex-start;justify-content:center;padding:22px;overflow:auto;z-index:30}.modal{width:820px;max-width:100%;background:#fff;border-radius:14px;padding:24px;box-shadow:0 25px 70px rgba(0,0,0,.25)}.modal h3{font-size:20px;margin-top:0}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:700;color:#566373;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);padding:9px 10px;border-radius:8px;background:#fff;color:var(--navy)}.field textarea{min-height:68px;resize:vertical}.hint{font-size:11px;color:var(--muted);margin-top:4px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:17px}
.empty{text-align:center;color:var(--muted);padding:28px}.alert{background:var(--redbg);color:#78311f;padding:11px;border-radius:8px;margin-bottom:13px;font-size:13px}.small{font-size:11.5px}.muted{color:var(--muted)}
.btn-small{font-size:12px;padding:6px 10px}.ai-status{font-size:11.5px;color:var(--muted);margin-top:6px;min-height:14px}.ai-row{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
.level{padding:10px;border-radius:9px;text-align:center}.level strong{font-size:20px;display:block}.master{background:#e6f2e8}.meet{background:#e7eff8}.approach{background:#fbf0d8}.notmeet{background:#f9e4dd}
.ocs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.ocs>div{padding:11px;border-radius:9px;background:#f7f7f4;border:1px solid var(--line)}.presentation{background:#fff;padding:24px;border-radius:14px}.presentation h1{margin:0 0 4px}.metric{font-size:30px;font-weight:800}.no-print{}
.loading{padding:60px;text-align:center;color:var(--muted)}
@media print{aside,.no-print,.delete,.statusSelect{display:none!important}main{padding:0;max-width:none}.panel,.card,.stat{box-shadow:none;break-inside:avoid}body{background:#fff}.presentation{padding:0}}
@media(max-width:900px){#app{display:block}aside{position:static;width:auto;height:auto}main{padding:20px}.stats,.two,.three,.four,.gg,.ocs{grid-template-columns:1fr}.page-head{display:block}.page-head .btn{margin-top:10px}}
</style>
</head>

function localGet(key){
  try{return JSON.parse(localStorage.getItem("ilp-"+key)||"null");}catch(e){return null;}
}
function localSet(key,value){localStorage.setItem("ilp-"+key,JSON.stringify(value));}
function teacherIdFromSubmission(d){
  const exact=TEACHERS.find(t=>t.name===d.teacherName && (!d.course||t.subject===d.course));
  if(exact)return exact.id;
  const byName=TEACHERS.find(t=>t.name===d.teacherName);
  return byName?byName.id:null;
}
function observationFromFirestore(id,d){
  if(d.teacherId && d.date)return {id,...d};
  const t=TEACHERS.find(x=>x.id===d.teacherKey)||TEACHERS.find(x=>x.name===d.teacherName);
  return {
    id,teacherId:t?t.id:(d.teacherKey||""),date:d.observationDate||d.date||"",
    type:d.observationType||d.type||"Classroom Observation",
    dataSource:d.dataSource||"Direct observation",getGuide:d.getGuide||"",
    getStrand:d.getStrand||d.getFocus||"",rating:d.rating||"Not Rated",
    gbfPhase:d.gbfPhase||"",gbfAction:d.gbfAction||d.gbfFocus||"",
    status:d.status||"Introduced",evidence:d.lowInferenceEvidence||d.evidence||"",
    glow:d.glow||"",grow:d.grow||"",actionStep:d.actionStep||"",
    followUp:d.followUpDate||d.followUp||"",notes:d.coachingNotes||d.notes||"",
    createdBy:d.createdBy||""
  };
}
function submissionToRecords(doc){
  const d=doc.data(),teacherId=teacherIdFromSubmission(d);
  if(!teacherId)return {ets:[],exams:[]};
  const periods=Array.isArray(d.periods)?d.periods:[];
  const common={sourceId:doc.id,teacherId,date:d.submissionDate||"",
    assessmentName:d.assessmentName||"",misconceptions:d.misconceptions||"",
    outcome:d.outcome||"",causes:d.causes||"",solutions:d.solutions||""};
  if(d.submissionType==="Exam/Assessment"){
    return {ets:[],exams:periods.map(p=>{
      const assessed=Number(p.assessed)||0;
      const success=(Number(p.mastered)||0)+(Number(p.met)||0)+(Number(p.approached)||0);
      return {id:`submission-${doc.id}-p${p.period}`,...common,
        examName:d.assessmentName||"Assessment",period:String(p.period||""),
        proficiency:assessed?Math.round(success/assessed*100):0,
        outcome:d.outcome||"",causes:d.causes||"",causeCategory:"Other",
        solutions:d.solutions||"",observationFocus:"",cloudSubmission:true};
    })};
  }
  return {exams:[],ets:periods.map(p=>({
    id:`submission-${doc.id}-p${p.period}`,...common,period:String(p.period||""),
    objective:p.objective||"",master:Number(p.mastered)||0,meet:Number(p.met)||0,
    approach:Number(p.approached)||0,notMeet:Number(p.didNotMeet)||0,
    nextSteps:d.solutions||"",observationLookFor:"",cloudSubmission:true
  }))};
}
async function ensureFirebaseUser(){
  if(fbAuth.currentUser){firebaseUser=fbAuth.currentUser;return firebaseUser;}
  const result=await fbAuth.signInWithPopup(fbProvider);
  firebaseUser=result.user;return firebaseUser;
}

function uid(){return crypto.randomUUID?crypto.randomUUID():"id"+Date.now()+Math.random().toString(36).slice(2)}
function fmt(d){return d?new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"\u2014"}
function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function teacher(id){return TEACHERS.find(t=>t.id===id)||{name:"",subject:""}}
function obsFor(id){return state.observations.filter(o=>o.teacherId===id).sort((a,b)=>b.date.localeCompare(a.date))}
function etFor(id){return state.exitTickets.filter(o=>o.teacherId===id).sort((a,b)=>b.date.localeCompare(a.date))}
function examsFor(id){return state.exams.filter(o=>o.teacherId===id).sort((a,b)=>b.date.localeCompare(a.date))}
function goalsFor(id){return state.goals.filter(g=>g.teacherId===id).sort((a,b)=>(b.startDate||"").localeCompare(a.startDate||""))}
function activeFor(id){return obsFor(id).filter(o=>!["Mastered","Sustaining"].includes(o.status))}
function totalET(x){return (+x.master||0)+(+x.meet||0)+(+x.approach||0)+(+x.notMeet||0)}
function pct(n,t){return t?Math.round((n/t)*100):0}

/* ---------- Firebase persistence ---------- */
async function loadAll(){
  await ensureFirebaseUser();
  const userEl=document.getElementById("firebaseUser");
  if(userEl)userEl.textContent=firebaseUser?.email||"Signed in";

  const [obsSnap,subSnap,etSnap,examSnap,goalSnap]=await Promise.all([
    fbDb.collection("observations").get(),
    fbDb.collection("instructionalSubmissions").get(),
    fbDb.collection("exitTickets").get(),
    fbDb.collection("exams").get(),
    fbDb.collection("goals").get()
  ]);

  state.observations=obsSnap.docs.map(doc=>observationFromFirestore(doc.id,doc.data()));
  const cloudET=[],cloudExams=[];
  subSnap.docs.forEach(doc=>{
    const mapped=submissionToRecords(doc);
    cloudET.push(...mapped.ets);cloudExams.push(...mapped.exams);
  });
  state.exitTickets=[
    ...cloudET,
    ...etSnap.docs.map(doc=>({id:doc.id,...doc.data(),cloudSubmission:false}))
  ];
  state.exams=[
    ...cloudExams,

  ];

  cloudConfig=localGet("cloudConfig");
  msalConfigSaved=localGet("msalConfig");
}
async function syncCollection(name,items,filterFn=()=>true){
  const writable=items.filter(filterFn);
  const snap=await fbDb.collection(name).get();
  const existing=new Set(snap.docs.map(d=>d.id));
  const batch=fbDb.batch();
  writable.forEach(item=>{
    const id=item.id||uid();item.id=id;
    batch.set(fbDb.collection(name).doc(id),
      {...item,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},
      {merge:true});
    existing.delete(id);
  });
  existing.forEach(id=>batch.delete(fbDb.collection(name).doc(id)));
  await batch.commit();
}

  try{await syncCollection("observations",state.observations);}

  {key:"misconceptions",label:"Misconceptions / errors",kw:["misconception","error"]},
  {key:"nextSteps",label:"Next steps",kw:["next step","reteach"]},
  {key:"observationLookFor",label:"Observation look-for",kw:["look for","lookfor","observe"]}

  {key:"teacherName",label:"Teacher name",kw:["teacher","name"],required:true},

  {key:"examName",label:"Exam / assessment name",kw:["exam","assessment","test"]},
  {key:"period",label:"Class period",kw:["period","class"]},
  {key:"proficiency",label:"% Proficient",kw:["proficien","score","%"],numeric:true},
  {key:"outcome",label:"Outcome",kw:["outcome","learn"]},

  {key:"solutions",label:"Solutions",kw:["solution"]},
  {key:"observationFocus",label:"Next observation focus",kw:["focus","next observation"]}
];
function guessHeader(headers,kw){
  const lower=headers.map(h=>String(h).toLowerCase());
  for(const k of kw){
    const i=lower.findIndex(h=>h.includes(k));
    if(i>-1)return headers[i];
  }
  return "";
}
function normalizeName(s){return String(s||"").toLowerCase().replace(/^(mr|mrs|ms|dr|miss)\.?\s+/,"").replace(/[^a-z\s]/g,"").trim();}
function matchTeacherByName(name){
  const n=normalizeName(name);
  if(!n)return null;
  const tokens=n.split(/\s+/);
  const last=tokens[tokens.length-1];
  let hit=TEACHERS.find(t=>!t.vacancy&&normalizeName(t.name).split(/\s+/).pop()===last);
  if(hit)return hit.id;
  hit=TEACHERS.find(t=>!t.vacancy&&normalizeName(t.name).includes(last));
  return hit?hit.id:null;
}
function parseSpreadsheet(file,cb){
  const r=new FileReader();
  r.onload=(e)=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      cb(rows,null);
    }catch(err){cb(null,err);}
  };
  r.onerror=()=>cb(null,new Error("Could not read file"));
  r.readAsBinaryString(file);
}
function openFormImport(){
  const o=modal(`<h3 class="serif">Import Form Data</h3>
  <div class="field"><label>What did teachers submit?</label>
    <select id="fiKind"><option value="et">Daily Exit Ticket Data</option><option value="exam">Exam Data &amp; OCS</option></select>
  </div>
  <div class="field"><label>Upload the exported file from Microsoft Forms (use Forms' "Open in Excel" / download responses button first, then upload that .xlsx or .csv file here)</label>
    <input id="fiFile" type="file" accept=".csv,.xlsx,.xls">
  </div>
  <div id="fiMapArea"></div>
  <div class="modal-actions"><button class="btn cancel">Cancel</button><button class="btn btn-primary confirm" style="display:none">Import Rows</button></div>`);
  let rows=[],headers=[],fieldDefs=ET_FIELDS;
  o.querySelector(".cancel").onclick=()=>o.remove();
  document.getElementById("fiKind").onchange=()=>{ if(rows.length) renderMap(); };
  document.getElementById("fiFile").onchange=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    parseSpreadsheet(file,(parsedRows,err)=>{
      if(err||!parsedRows||!parsedRows.length){
        document.getElementById("fiMapArea").innerHTML=`<div class="alert">Could not read that file. Make sure it's the Excel/CSV export from Microsoft Forms.</div>`;
        return;
      }
      rows=parsedRows;
      headers=Object.keys(rows[0]);
      renderMap();
    });
  };
  function renderMap(){
    fieldDefs=document.getElementById("fiKind").value==="et"?ET_FIELDS:EXAM_FIELDS;
    const area=document.getElementById("fiMapArea");
    area.innerHTML=`<p class="hint">${rows.length} row(s) found. Match each field below to a column from your form export, then import.</p>
    <div class="two">${fieldDefs.map(f=>{
      const guess=guessHeader(headers,f.kw);
      return `<div class="field"><label>${esc(f.label)}${f.required?" *":""}</label><select data-field="${f.key}" class="fi-map"><option value="">-- not in this file --</option>${headers.map(h=>`<option value="${esc(h)}" ${h===guess?"selected":""}>${esc(h)}</option>`).join("")}</select></div>`;
    }).join("")}</div>`;
    o.querySelector(".confirm").style.display="inline-block";
  }
  o.querySelector(".confirm").onclick=async()=>{
    const kind=document.getElementById("fiKind").value;
    fieldDefs=kind==="et"?ET_FIELDS:EXAM_FIELDS;
    const mapping={};
    o.querySelectorAll(".fi-map").forEach(s=>mapping[s.dataset.field]=s.value);
    let imported=0,unmatched=0;
    rows.forEach(row=>{
      const get=(key)=>mapping[key]?row[mapping[key]]:"";
      const teacherId=matchTeacherByName(get("teacherName"));
      if(!teacherId){unmatched++;return;}
      let dateVal=get("date");
      if(dateVal instanceof Date)dateVal=dateVal.toISOString().slice(0,10);
      else if(typeof dateVal==="number")dateVal=new Date(Math.round((dateVal-25569)*86400*1000)).toISOString().slice(0,10);
      else{const d=new Date(dateVal);dateVal=isNaN(d)?new Date().toISOString().slice(0,10):d.toISOString().slice(0,10);}
      if(kind==="et"){
        state.exitTickets.push({id:uid(),teacherId,date:dateVal,period:get("period"),objective:get("objective"),master:+get("master")||0,meet:+get("meet")||0,approach:+get("approach")||0,notMeet:+get("notMeet")||0,misconceptions:get("misconceptions"),nextSteps:get("nextSteps"),observationLookFor:get("observationLookFor")});
      }else{
        state.exams.push({id:uid(),teacherId,date:dateVal,examName:get("examName"),period:get("period"),proficiency:get("proficiency"),outcome:get("outcome"),causes:get("causes"),causeCategory:get("causeCategory")||"Other",solutions:get("solutions"),observationFocus:get("observationFocus")});
      }
      imported++;
    });
    if(kind==="et")await saveExitTickets(); else await saveExams();
    o.remove();
    render();
    alert(`Imported ${imported} row(s).${unmatched?` ${unmatched} row(s) skipped \u2014 teacher name didn't match your roster.`:""}`);
  };
}

  <p class="hint">Sign in with your work Microsoft account and pull in new exit ticket / exam rows from the shared workbook. Config is saved for next time.</p>
  <div id="odMsg"></div>
  <div class="two"><div class="field"><label>Azure App Client ID</label><input id="odClientId" value="${esc(c.clientId||"")}"></div><div class="field"><label>Tenant ID</label><input id="odTenantId" value="${esc(c.tenantId||"")}"></div></div>
  <div class="field"><label>Workbook Sharing Link</label><input id="odShareUrl" value="${esc(c.shareUrl||"")}"></div>
  <div class="modal-actions"><button class="btn cancel">Cancel</button><button class="btn btn-primary sync">Save &amp; Sync Now</button></div>`);
  o.querySelector(".cancel").onclick=()=>o.remove();
  o.querySelector(".sync").onclick=async()=>{
    const v=x=>document.getElementById(x).value.trim();
    const msgEl=document.getElementById("odMsg");
    const clientId=v("odClientId"),tenantId=v("odTenantId"),shareUrl=v("odShareUrl");
    if(!clientId||!tenantId||!shareUrl){msgEl.innerHTML=`<div class="alert">Fill in your client ID, tenant ID, and sharing link first.</div>`;return;}
    const btn=o.querySelector(".sync");
    btn.disabled=true; msgEl.innerHTML=`<div class="hint">Connecting...</div>`;
    try{
      await loadMsalSDK();
      msalConfigSaved={clientId,tenantId,shareUrl};
      localSet("msalConfig",msalConfigSaved);
      const msalInstance=new msal.PublicClientApplication({auth:{clientId,authority:"https://login.microsoftonline.com/"+tenantId,redirectUri:window.location.origin+window.location.pathname}});
      const scopes=["User.Read","Files.Read"];
      const resp=await msalInstance.loginPopup({scopes});
      const tokenResp=await msalInstance.acquireTokenSilent({scopes,account:resp.account}).catch(()=>msalInstance.acquireTokenPopup({scopes,account:resp.account}));
      const token=tokenResp.accessToken;
      const encoded=encodeSharingUrl(shareUrl);
      const itemRes=await fetch(`https://graph.microsoft.com/v1.0/shares/${encoded}/driveItem?$select=id,parentReference`,{headers:{Authorization:`Bearer ${token}`}});
      if(!itemRes.ok)throw new Error("Could not open the shared workbook \u2014 check the link and your access.");
      const item=await itemRes.json();
      const workbookBase=`https://graph.microsoft.com/v1.0/drives/${item.parentReference.driveId}/items/${item.id}/workbook`;
      let added=0,skipped=0;
      const etRes=await fetch(`${workbookBase}/tables('ExitTickets')/rows`,{headers:{Authorization:`Bearer ${token}`}});
      if(etRes.ok){
        const etData=await etRes.json();
        (etData.value||[]).forEach(row=>{
          const r=row.values[0];
          const sourceId=`ET|${r[1]}|${r[2]}|${r[4]}`;
          if(state.exitTickets.some(e=>e.sourceId===sourceId)){skipped++;return;}
          const teacherId=matchTeacherByName(r[1]);
          if(!teacherId){skipped++;return;}
          state.exitTickets.push({id:uid(),sourceId,teacherId,date:r[2]||"",period:r[3]||"",objective:r[4]||"",master:+r[5]||0,meet:+r[6]||0,approach:+r[7]||0,notMeet:+r[8]||0,misconceptions:r[9]||"",nextSteps:r[10]||"",observationLookFor:r[11]||""});
          added++;
        });
      }
      const xRes=await fetch(`${workbookBase}/tables('Exams')/rows`,{headers:{Authorization:`Bearer ${token}`}});
      if(xRes.ok){
        const xData=await xRes.json();
        (xData.value||[]).forEach(row=>{
          const r=row.values[0];
          const sourceId=`EX|${r[1]}|${r[2]}|${r[3]}`;
          if(state.exams.some(e=>e.sourceId===sourceId)){skipped++;return;}
          const teacherId=matchTeacherByName(r[1]);
          if(!teacherId){skipped++;return;}
          state.exams.push({id:uid(),sourceId,teacherId,date:r[2]||"",examName:r[3]||"",period:r[4]||"",proficiency:r[5]||"",outcome:r[6]||"",causes:r[7]||"",causeCategory:r[8]||"Other",solutions:r[9]||"",observationFocus:r[10]||""});
          added++;
        });
      }
      await saveExitTickets(); await saveExams();
      msgEl.innerHTML=`<div style="background:#e3f0e6;color:#39734b;padding:10px;border-radius:8px">Synced. ${added} new record(s) added${skipped?`, ${skipped} skipped (already synced or unmatched teacher)`:""}.</div>`;
      render();
    }catch(err){
      msgEl.innerHTML=`<div class="alert">Sync failed: ${esc(err.message)}</div>`;
    }
    btn.disabled=false;
  };
}
document.getElementById("oneDriveSyncBtn").addEventListener("click",openOneDriveSync);

document.getElementById("formImportBtn").addEventListener("click",openFormImport);

(async function init(){
  await loadAll();
  ready=true;
  render();
})();
</script>
</body>
</html>
