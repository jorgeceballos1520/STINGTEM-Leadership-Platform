<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GTL Discipline Request</title><style>body{margin:0;background:#f5f3ed;color:#17283c;font-family:Arial}.wrap{max-width:820px;margin:auto;padding:22px}.hero{background:#17283c;color:#fff;padding:22px;border-radius:15px;margin-bottom:14px}.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:17px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.f{margin-bottom:11px}label{display:block;font-size:12px;font-weight:700;margin-bottom:5px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}textarea{min-height:85px}button{background:#17283c;color:#fff;border:0;border-radius:8px;padding:10px 14px;font-weight:700}.msg{display:none;padding:10px;margin-top:10px;border-radius:8px}.show{display:block}.ok{background:#e3f0e6}.err{background:#f9e4dd}@media(max-width:700px){.g2{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="hero"><h1 style="margin:0">Discipline Review Request</h1><p style="margin:5px 0 0">IDEA Spears · Grade <span id="gradeLabel"></span></p></div><div class="card" id="invalid" style="display:none">Link not recognized. Use the unique link provided by Jorge Ceballos.</div><div class="card" id="formCard"><form id="form"><div class="g2"><div class="f"><label>Student name *</label><input id="studentName" required></div><div class="f"><label>Student ID *</label><input id="studentId" required></div></div><div class="g2"><div class="f"><label>Incident date *</label><input id="incidentDate" type="date" required></div><div class="f"><label>Submitted by *</label><input id="submittedByName" required></div></div><div class="f"><label>Behavior category *</label><select id="behaviorCategory" required><option value="">Select</option><option>Disruption</option><option>Defiance / Noncompliance</option><option>Fighting / Aggression</option><option>Bullying / Harassment</option><option>Academic Dishonesty</option><option>Technology Misuse</option><option>Attendance / Tardy</option><option>Contraband</option><option>Other</option></select></div><div class="f"><label>Concern summary *</label><textarea id="concernSummary" required></textarea></div><div class="f"><label>Objective incident description *</label><textarea id="incidentDescription" required></textarea></div><div class="f"><label>Interventions attempted</label><textarea id="interventionsAttempted"></textarea></div><div class="g2"><div class="f"><label>Parent contacted?</label><select id="parentContacted"><option>No</option><option>Yes</option><option>Attempted — no response</option></select></div><div class="f"><label>Suggested action</label><select id="suggestedAction"><option value="">Select</option><option>Administrator conference</option><option>Lunch detention</option><option>ISS review</option><option>OSS review</option><option>Parent meeting</option><option>Behavior contract</option><option>Other</option></select></div></div><div class="f"><label>Parent contact notes</label><textarea id="parentContactNotes"></textarea></div><div class="f"><label>Additional notes</label><textarea id="additionalNotes"></textarea></div><div style="text-align:right"><button id="submitBtn">Submit request</button></div><div id="msg" class="msg"></div></form></div></div><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script>const firebaseConfig={apiKey:"AIzaSyA7nr506RwbSNZKFGPRKjb_qc_OFpgAhUM",authDomain:"idea-spears.firebaseapp.com",projectId:"idea-spears",storageBucket:"idea-spears.firebasestorage.app",messagingSenderId:"619672486663",appId:"1:619672486663:web:8672bb614d892ea00e7ba2",measurementId:"G-0SCW3PVT1D"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);const db=firebase.firestore(),p=new URLSearchParams(location.search),grade=p.get('grade')||'',key=p.get('key')||'',valid=(grade==='9'&&key==='GTL9-SPEARS-2026')||(grade==='10'&&key==='GTL10-SPEARS-2026');gradeLabel.textContent=grade;incidentDate.value=new Date().toISOString().slice(0,10);if(!valid){invalid.style.display='block';formCard.style.display='none'}form.onsubmit=async e=>{e.preventDefault();submitBtn.disabled=true;const r={portalKey:key,grade,studentName:studentName.value.trim(),studentId:studentId.value.trim(),incidentDate:incidentDate.value,submittedByName:submittedByName.value.trim(),behaviorCategory:behaviorCategory.value,concernSummary:concernSummary.value.trim(),incidentDescription:incidentDescription.value.trim(),interventionsAttempted:interventionsAttempted.value.trim(),parentContacted:parentContacted.value,parentContactNotes:parentContactNotes.value.trim(),suggestedAction:suggestedAction.value,additionalNotes:additionalNotes.value.trim(),status:'Open',submittedAt:firebase.firestore.FieldValue.serverTimestamp()};try{await db.collection('disciplineRequests').add(r);msg.textContent='Request submitted successfully.';msg.className='msg show ok';form.reset();incidentDate.value=new Date().toISOString().slice(0,10)}catch(err){msg.textContent=err.message;msg.className='msg show err'}finally{submitBtn.disabled=false}}</script></body></html>
